<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <title>Profile | LUNA ARENA</title>
    <style>
        .profile-card { max-width: 600px; margin: 0 auto; background: var(--card-bg); border: 1px solid var(--border-glass); border-radius: 20px; padding: 40px; }
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 20px; }
        .profile-field { margin-bottom: 14px; }
        .profile-field label { color: var(--text-dim); font-size: 11px; letter-spacing: 2px; display: block; margin-bottom: 4px; }
        .profile-field span { color: var(--text-main); font-family: 'Rajdhani'; font-size: 1rem; font-weight: 600; }
        .theme-options { display: flex; gap: 12px; margin-top: 8px; }
        .theme-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--border-glass); background: transparent; color: var(--text-main); cursor: pointer; font-family: 'Rajdhani'; font-weight: 600; transition: all 0.2s; }
        .theme-btn.active { background: var(--neon-blue); border-color: var(--neon-blue); color: #000; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; letter-spacing: 1px; font-weight: 700; }
        .badge-user { background: rgba(0,242,255,0.1); color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .badge-admin { background: rgba(255,0,128,0.1); color: var(--cyber-pink); border: 1px solid var(--cyber-pink); }
    </style>
</head>
<body>
    <header>
        <div class="logo">LUNA<span>ARENA</span></div>
                <nav>
            <a href="index.html">Home</a>
            <a href="player.html">Legends</a>
            <a href="tournaments.html">Tournaments</a>
            <a href="leaderboard.html">Leaderboard</a>
            <a href="contact.html">Join</a>
            <a href="signup.html">Sign Up</a>
            <a href="login.html">Login</a>
            <a href="profile.html">Profile</a>
            <button class="theme-toggle" id="themeToggle" onclick="ThemeManager.toggle()" title="Toggle Dark/Light Mode">☀️</button>
        </nav>
    </header>

    <section id="contact" style="padding-top:120px;">
        <div id="notLoggedIn" style="text-align:center; display:none;">
            <h2 style="font-family:'Orbitron'; color:var(--neon-blue);">NOT LOGGED IN</h2>
            <p style="color:var(--text-dim); margin:16px 0;">You need an account to view your profile.</p>
            <a href="login.html" class="btn" style="text-decoration:none; margin-right:10px;">LOGIN</a>
            <a href="signup.html" class="btn" style="text-decoration:none; background:transparent; border:1px solid var(--neon-blue); color:var(--neon-blue);">SIGN UP</a>
        </div>

        <div id="profileContent" style="display:none;">
            <div class="profile-card">
                <div style="text-align:center; margin-bottom:30px;">
                    <div class="profile-avatar" id="avatarIcon">👤</div>
                    <h2 id="profileName" style="font-family:'Orbitron'; color:var(--neon-blue); margin-bottom:6px;"></h2>
                    <span id="profileBadge" class="badge badge-user">USER</span>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px;">
                    <div class="profile-field"><label>FIRST NAME</label><span id="pFirstName"></span></div>
                    <div class="profile-field"><label>LAST NAME</label><span id="pLastName"></span></div>
                    <div class="profile-field"><label>EMAIL</label><span id="pEmail"></span></div>
                    <div class="profile-field"><label>AGE</label><span id="pAge"></span></div>
                    <div class="profile-field"><label>MEMBER SINCE</label><span id="pJoined"></span></div>
                </div>
                <div style="border-top:1px solid var(--border-glass); padding-top:24px;">
                    <label style="color:var(--text-dim); font-size:11px; letter-spacing:2px; display:block; margin-bottom:10px;">PERSONALIZE THEME</label>
                    <div class="theme-options">
                        <button class="theme-btn" id="btnDark" onclick="setTheme('dark')">🌙 DARK</button>
                        <button class="theme-btn" id="btnLight" onclick="setTheme('light')">☀️ LIGHT</button>
                    </div>
                </div>
                <div style="margin-top:28px; text-align:center;">
                    <button class="btn" style="background:transparent; border:1px solid #ff4d4d; color:#ff4d4d;" onclick="logout()">LOGOUT</button>
                    <span id="adminLink" style="display:none; margin-left:16px;">
                        <a href="admin.html" class="btn" style="text-decoration:none;">ADMIN PANEL →</a>
                    </span>
                </div>
            </div>
        </div>
    </section>

    <script src="luna-core.js"></script>
    <script>
        async function loadProfile() {
            try {
                const res = await fetch('/api/me', { credentials: 'include' });
                if (!res.ok) { document.getElementById('notLoggedIn').style.display='block'; return; }
                const u = await res.json();
                document.getElementById('profileContent').style.display = 'block';
                document.getElementById('profileName').textContent = u.first_name.toUpperCase() + ' ' + u.last_name.toUpperCase();
                document.getElementById('pFirstName').textContent = u.first_name;
                document.getElementById('pLastName').textContent = u.last_name;
                document.getElementById('pEmail').textContent = u.email;
                document.getElementById('pAge').textContent = u.age;
                document.getElementById('pJoined').textContent = new Date(u.created_at).toLocaleDateString();
                if (u.role === 'admin') {
                    document.getElementById('profileBadge').textContent = 'ADMIN';
                    document.getElementById('profileBadge').className = 'badge badge-admin';
                    document.getElementById('adminLink').style.display = 'inline';
                }
                const theme = u.theme || localStorage.getItem('lunaArenaTheme') || 'dark';
                ThemeManager.apply(theme);
                document.getElementById(theme === 'dark' ? 'btnDark' : 'btnLight').classList.add('active');
            } catch(e) {
                document.getElementById('notLoggedIn').style.display='block';
            }
        }

        async function setTheme(t) {
            ThemeManager.apply(t);
            document.getElementById('btnDark').classList.toggle('active', t==='dark');
            document.getElementById('btnLight').classList.toggle('active', t==='light');
            await fetch('/api/me/theme', { method:'PUT', credentials:'include', headers:{'Content-Type':'application/json'}, body: JSON.stringify({theme:t}) });
        }

        async function logout() {
            await fetch('/api/logout', { method:'POST', credentials:'include' });
            window.location.href = 'login.html';
        }

        loadProfile();
    </script>
</body>
</html>
